name = "docusync-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 存储桶绑定
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "$R2_BUCKET_NAME"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "$D1_DATABASE_NAME"
database_id = "$D1_DATABASE_ID"

# Workers AI 绑定
[ai]
binding = "AI"

# Observability
[observability.logs]
enabled = true
invocation_logs = true
