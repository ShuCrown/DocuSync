name = "docusync-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# R2 存储桶绑定
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "docusync-files"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "docusync-db"
database_id = "98ba906d-9656-48b3-90c2-840ee59a6cab"

# Workers AI 绑定
[ai]
binding = "AI"

# Observability
[observability.logs]
enabled = true
invocation_logs = true
