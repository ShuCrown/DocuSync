name: Pake Desktop Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      mode:
        description: "Build mode"
        required: true
        default: "pake"
        type: choice
        options:
          - pake
          - pake-private
      debug:
        description: "Enable debug build (DevTools)"
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: "22"

jobs:
  build-macos:
    runs-on: macos-latest
    name: Build macOS ARM64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:${{ inputs.mode || 'pake' }}

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Build macOS app
        run: >-
          pake dist/index.pake.html
          --name DocuSync
          --icon public/favicon.svg
          --targets apple
          --width 1200
          --height 800
          --hide-title-bar
          --use-local-file
          ${{ inputs.debug == true && '--debug' || '' }}

      - name: List build output
        run: find . -name "*.dmg" -o -name "*.app" 2>/dev/null | head -20

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocuSync-macos-arm64${{ inputs.debug == true && '-debug' || '' }}
          path: "**/*.dmg"
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    name: Build Windows x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build:${{ inputs.mode || 'pake' }}

      - name: Install pake-cli
        run: npm install -g pake-cli

      - name: Build Windows app
        run: >-
          pake dist/index.pake.html
          --name DocuSync
          --icon public/favicon.svg
          --targets x64
          --width 1200
          --height 800
          --use-local-file
          ${{ inputs.debug == true && '--debug' || '' }}

      - name: List build output
        run: Get-ChildItem -Recurse -Include *.msi,*.exe | Select-Object -ExpandProperty FullName

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DocuSync-windows-x64${{ inputs.debug == true && '-debug' || '' }}
          path: |
            **/*.msi
            **/*.exe
          if-no-files-found: error
