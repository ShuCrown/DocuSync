name = "docusync"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages 配置
pages_build_output_dir = "./dist"

# R2 存储桶绑定
[[r2_buckets]]
binding = "FILES_BUCKET"
bucket_name = "docusync-files"

# Workers AI 绑定
[ai]
binding = "AI"

# KV 命名空间绑定（用于缓存摘要结果，可选）
# [[kv_namespaces]]
# binding = "CACHE_KV"
# id = "your-kv-namespace-id"

# Observability
[observability.logs]
enabled = true
invocation_logs = true
